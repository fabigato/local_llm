services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui

    restart: unless-stopped

    ports:
      - "3000:8080"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      # Globally enables the memory framework architecture
      - ENABLE_MEMORIES=True
      # Controls permissions for user memory access (Defaults to True)
      - USER_PERMISSIONS_FEATURES_MEMORIES=True
      - FEATURES_MEMORIES=True # Forces the feature flag ON for all users 

      - ENABLE_WEB_SEARCH=True
      # Use Brave Search as the web search engine
      - WEB_SEARCH_ENGINE=brave
      # API key injected from .env
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY}

      # 3. CRITICAL: Forces Open WebUI to read docker-compose environment variables 
      # over database overrides if you update them in the future.
      - ENABLE_PERSISTENT_CONFIG=False
      # on open webui 0.9.5 seems to be a bug where urls for downloading generated images are validated to protect against 
      # Server Side Request Forgery. In general, a good idea, since it protects your computer's internal url's from being accessed by external
      # users through the llm via tool calling. But for image search it makes no sense since the tool is safe. That validation only happens if
      # this variable is set to False (default) so this is to turn it off, otherwise generate image tool won't be able to download the
      # generated image
      - ENABLE_RAG_LOCAL_WEB_FETCH=true

    volumes:
      - open-webui:/app/backend/data

    networks:
      - ai-network

  nginx:
    image: nginx:latest
    container_name: nginx

    restart: unless-stopped

    depends_on:
      - open-webui

    ports:
      - "80:80"
      - "443:443"

    environment:
      # Domains are injected into the nginx config at container startup via the
      # official image's envsubst-on-templates feature. Keeps real domains out
      # of git. Set these in .env (see .env.example).
      PRIMARY_DOMAIN: ${PRIMARY_DOMAIN}
      SECONDARY_DOMAIN: ${SECONDARY_DOMAIN}

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # *.template files here are rendered (envsubst) into /etc/nginx/conf.d at
      # startup. The output dir must NOT be a read-only mount.
      - ./nginx/templates:/etc/nginx/templates:ro

      # certificates
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot

    networks:
      - ai-network

  openclaw:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw
    depends_on:
      hindsight:
        condition: service_healthy

    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
      TELEGRAM_OWNER: telegram:${OPENCLAW_TELEGRAM_USER_ID}
      TELEGRAM_BOT_TOKEN: ${OPENCLAW_TELEGRAM_BOT_TOKEN}
      OPENCLAW_HOST_LAN_IP: ${OPENCLAW_HOST_LAN_IP}

      # Tell OpenClaw to look inside our baked-in system directory for extensions
      OPENCLAW_PLUGINS_PATH: /usr/share/openclaw/extensions
    volumes:
      - ${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw
      - ${OPENCLAW_WORKSPACE_DIR}:/home/node/.openclaw/workspace
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
      - "${OPENCLAW_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    # Check if plugin folder exists. If missing, install it once directly into the mounted volume, then boot.
    command:
      [
        "sh",
        "-c",
        "if [ ! -d '/home/node/.openclaw/extensions/hindsight-openclaw' ] || [ ! -d '/home/node/.openclaw/npm' ]; then openclaw plugins install --force @vectorize-io/hindsight-openclaw && rm -rf /tmp/jiti/; fi && exec node dist/index.js gateway --bind ${OPENCLAW_GATEWAY_BIND:-lan} --port 18789"
      ]


    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - ai-network

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight
    restart: unless-stopped
    ports:
      - "8888:8888"
      - "9999:9999"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    environment:
      HINDSIGHT_API_LLM_PROVIDER: ollama
      HINDSIGHT_API_LLM_BASE_URL: http://host.docker.internal:11434/v1
      HINDSIGHT_API_LLM_MODEL: gemma3:12b

      HINDSIGHT_API_EMBEDDING_PROVIDER: ollama
      HINDSIGHT_API_EMBEDDING_BASE_URL: http://host.docker.internal:11434
      HINDSIGHT_API_EMBEDDING_MODEL: bge-m3

    networks:
      - ai-network
    

networks:
  ai-network:

volumes:
  open-webui:
  hindsight_data: