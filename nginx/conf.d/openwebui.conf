server {
    listen 80;

    server_name chat.fabigato.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;

    server_name chat.redmemoria.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name chat.fabigato.com;

    ssl_certificate /etc/letsencrypt/live/chat.fabigato.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.fabigato.com/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://open-webui:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600;
    }
}

server {
    listen 443 ssl;
    http2 on;

    server_name chat.redmemoria.net;

    ssl_certificate /etc/letsencrypt/live/chat.redmemoria.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chat.redmemoria.net/privkey.pem;

    location / {
        proxy_pass http://open-webui:8080;

        proxy_http_version 1.1;

        proxy_set_header Host $host;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600;
    }
}